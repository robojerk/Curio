name: Build Flatpak

# Published GitHub Releases only (pre-releases and full releases). Drafts do not run.
# Test locally: ./research/scripts/act-flatpak-release.sh (workflow_dispatch; no release upload)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Version / Flatpak branch (e.g. v0.1.0, alpha_1, stable)
        required: false
        default: stable

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flatpak:
    name: Flatpak (${{ matrix.arch }})
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && github.event.release.draft == false)
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.9
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
          # - arch: aarch64  # enable with QEMU when ready

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set bundle metadata
        id: meta
        shell: bash
        run: |
          ARCH="${{ matrix.arch }}"
          BUNDLE="io.github.curio.Curio-${ARCH}.flatpak"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "prerelease=${{ github.event.release.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ inputs.tag }}"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "Building ${BUNDLE} for ${ARCH} (branch/tag: ${TAG})"

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/io.github.curio.Curio.json
          bundle: ${{ steps.meta.outputs.bundle }}
          arch: ${{ matrix.arch }}
          branch: ${{ steps.meta.outputs.tag }}
          upload-artifact: false
          cache-key: curio-${{ matrix.arch }}-${{ steps.meta.outputs.tag }}-${{ github.sha }}

      - name: Write checksum
        run: sha256sum "${{ steps.meta.outputs.bundle }}" > "${{ steps.meta.outputs.bundle }}.sha256"

      - name: Upload to GitHub Release
        if: github.event_name == 'release' && env.ACT != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.meta.outputs.bundle }}
            ${{ steps.meta.outputs.bundle }}.sha256
          fail_on_unmatched_files: true
          make_latest: ${{ github.event.release.prerelease == false }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch' && env.ACT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: curio-flatpak-${{ matrix.arch }}
          path: |
            ${{ steps.meta.outputs.bundle }}
            ${{ steps.meta.outputs.bundle }}.sha256
            flatpak/io.github.curio.Curio.json
